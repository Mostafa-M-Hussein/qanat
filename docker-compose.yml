name: qanat

# qanat - run downloads + media on a fast vps, stream them back over a slow link.
# named after the قناة, the underground channels that carry water across deserts.
#
# profiles:
#   default   aria2 + ariang + metube + jellyfin + caddy
#   music     adds navidrome
#   tunnel    adds cloudflared (no public ports needed)
#   warp      adds an outbound warp socks5 proxy

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # aria2-pro: multi-connection downloader (http/ftp/bittorrent)
  # rpc on 127.0.0.1:6800, bt listener on $ARIA2_BT_PORT
  aria2:
    image: p3terx/aria2-pro:latest
    container_name: qanat-aria2
    restart: unless-stopped
    environment:
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
      - UMASK_SET=022
      - RPC_SECRET=${ARIA2_RPC_SECRET}
      - RPC_PORT=6800
      - LISTEN_PORT=${ARIA2_BT_PORT:-6888}
      - DISK_CACHE=${ARIA2_DISK_CACHE:-64M}
      - IPV6_MODE=false
      - UPDATE_TRACKERS=true
      - TZ=${TZ:-UTC}
    volumes:
      - ./aria2-config:/config
      - ${DOWNLOADS_DIR:-./files}:/downloads
    ports:
      - "127.0.0.1:6800:6800"
      - "${ARIA2_BT_PORT:-6888}:6888"
      - "${ARIA2_BT_PORT:-6888}:6888/udp"
    logging: *default-logging

  # ariang: web ui for aria2
  ariang:
    image: p3terx/ariang:latest
    container_name: qanat-ariang
    restart: unless-stopped
    command: --port 6880 --ipv6
    ports:
      - "127.0.0.1:6880:6880"
    depends_on: [aria2]
    logging: *default-logging

  # metube: yt-dlp web ui. routes through warp when youtube blocks the vps ip.
  metube:
    image: ghcr.io/alexta69/metube:latest
    container_name: qanat-metube
    restart: unless-stopped
    environment:
      - UID=${PUID:-0}
      - GID=${PGID:-0}
      - DOWNLOAD_DIR=/downloads
      - STATE_DIR=/downloads/.metube-state
      - TEMP_DIR=/downloads/.metube-temp
      - OUTPUT_TEMPLATE=${METUBE_OUTPUT_TEMPLATE:-%(uploader)s/%(title)s.%(ext)s}
      - YTDL_OPTIONS=${METUBE_YTDL_OPTIONS}
    volumes:
      - ${MEDIA_DIR:-./media}/YouTube:/downloads
      - ${COOKIES_FILE:-./examples/cookies.txt.example}:/cookies.txt:ro
    ports:
      - "127.0.0.1:8081:8081"
    logging: *default-logging

  # jellyfin: stream what you downloaded.
  # uncomment the devices block if your vps has a gpu.
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: qanat-jellyfin
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      - JELLYFIN_PublishedServerUrl=${JELLYFIN_URL:-http://localhost:8096}
    volumes:
      - ./jellyfin/config:/config
      - ./jellyfin/cache:/cache
      - ${MEDIA_DIR:-./media}:/media
    ports:
      - "127.0.0.1:8096:8096"
    # devices:
    #   - /dev/dri:/dev/dri  # intel/amd vaapi
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8096/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging

  # navidrome: subsonic-compatible music streamer (optional)
  navidrome:
    image: deluan/navidrome:latest
    container_name: qanat-navidrome
    restart: unless-stopped
    profiles: [music]
    environment:
      - ND_LOGLEVEL=info
      - ND_SESSIONTIMEOUT=24h
      - ND_BASEURL=
      - ND_ENABLETRANSCODINGCONFIG=true
    volumes:
      - ./navidrome/data:/data
      - ${MUSIC_DIR:-./media/Music}:/music:ro
    ports:
      - "127.0.0.1:4533:4533"
    logging: *default-logging

  # caddy: tls reverse proxy + auto letsencrypt + basic auth
  caddy:
    image: caddy:2-alpine
    container_name: qanat-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/data:/data
      - ./caddy/config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - ACME_EMAIL=${ACME_EMAIL:-admin@example.com}
      - BASIC_AUTH_USER=${BASIC_AUTH_USER:-admin}
      - BASIC_AUTH_HASH=${BASIC_AUTH_HASH}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging: *default-logging

  # cloudflared: optional zero-trust tunnel (no open ports needed)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: qanat-cloudflared
    restart: unless-stopped
    profiles: [tunnel]
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    logging: *default-logging

  # warp: optional outbound socks5 (cloudflare warp).
  # use it when youtube/spotify block your vps ip.
  warp:
    image: monius/docker-warp-socks:latest
    container_name: qanat-warp
    restart: unless-stopped
    profiles: [warp]
    cap_add: [NET_ADMIN]
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    ports:
      - "127.0.0.1:40000:1080"
    logging: *default-logging

  # opencloud: file management + sharing (the "drive" half of the stack).
  # eu-led fork of owncloud infinite scale. caddy terminates tls so we
  # set PROXY_TLS=false and bind to loopback.
  opencloud:
    image: opencloudeu/opencloud-rolling:${OC_DOCKER_TAG:-6.1.0}
    container_name: qanat-opencloud
    restart: unless-stopped
    user: "${OC_UID_GID:-1000:1000}"
    entrypoint: ["/bin/sh"]
    command: ["-c", "opencloud init || true; opencloud server"]
    environment:
      OC_URL: https://cloud.${DOMAIN:-localhost}
      OC_LOG_LEVEL: ${OC_LOG_LEVEL:-info}
      PROXY_TLS: "false"
      OC_INSECURE: "false"
      IDM_ADMIN_PASSWORD: ${OC_ADMIN_PASSWORD}
      IDM_CREATE_DEMO_USERS: "false"
      PROXY_CSP_CONFIG_FILE_LOCATION: /etc/opencloud/csp.yaml
      OC_PASSWORD_POLICY_BANNED_PASSWORDS_LIST: banned-password-list.txt
      OC_SHARING_PUBLIC_SHARE_MUST_HAVE_PASSWORD: "true"
      # collabora wiring (only useful when --profile office is up):
      COLLABORA_DOMAIN: collabora.${DOMAIN:-localhost}
      NATS_NATS_HOST: 0.0.0.0
      GATEWAY_GRPC_ADDR: 0.0.0.0:9142
      FRONTEND_APP_HANDLER_SECURE_VIEW_APP_ADDR: eu.opencloud.api.collaboration
    volumes:
      - ./config/opencloud/csp.yaml:/etc/opencloud/csp.yaml:ro
      - ./config/opencloud/banned-password-list.txt:/etc/opencloud/banned-password-list.txt:ro
      - ./opencloud/config:/etc/opencloud
      - ./opencloud/data:/var/lib/opencloud
    ports:
      - "127.0.0.1:9200:9200"
    logging: *default-logging

  # collaboration: opencloud's wopi bridge to collabora. profile: office
  collaboration:
    image: opencloudeu/opencloud-rolling:${OC_DOCKER_TAG:-6.1.0}
    container_name: qanat-collaboration
    restart: unless-stopped
    profiles: [office]
    user: "${OC_UID_GID:-1000:1000}"
    entrypoint: ["/bin/sh"]
    command: ["-c", "opencloud collaboration server"]
    depends_on:
      opencloud:
        condition: service_started
      collabora:
        condition: service_healthy
    environment:
      COLLABORATION_GRPC_ADDR: 0.0.0.0:9301
      COLLABORATION_HTTP_ADDR: 0.0.0.0:9300
      MICRO_REGISTRY: nats-js-kv
      MICRO_REGISTRY_ADDRESS: opencloud:9233
      COLLABORATION_WOPI_SRC: https://collaboration.${DOMAIN:-localhost}
      COLLABORATION_APP_NAME: CollaboraOnline
      COLLABORATION_APP_PRODUCT: Collabora
      COLLABORATION_APP_ADDR: https://collabora.${DOMAIN:-localhost}
      COLLABORATION_APP_ICON: https://collabora.${DOMAIN:-localhost}/favicon.ico
      COLLABORATION_APP_INSECURE: "false"
      COLLABORATION_CS3API_DATAGATEWAY_INSECURE: "false"
      COLLABORATION_LOG_LEVEL: ${OC_LOG_LEVEL:-info}
      OC_URL: https://cloud.${DOMAIN:-localhost}
    volumes:
      - ./opencloud/config:/etc/opencloud
    logging: *default-logging

  # collabora online: actual office editor. profile: office
  collabora:
    image: collabora/code:25.04.9.4.1
    container_name: qanat-collabora
    restart: unless-stopped
    profiles: [office]
    cap_add: [SYS_ADMIN]
    security_opt:
      - seccomp=unconfined
      - apparmor:unconfined
    environment:
      aliasgroup1: https://collaboration.${DOMAIN:-localhost}
      DONT_GEN_SSL_CERT: "YES"
      extra_params: --o:ssl.enable=false --o:ssl.termination=true --o:welcome.enable=false --o:net.frame_ancestors=cloud.${DOMAIN:-localhost} --o:net.lok_allow.host[14]=cloud.${DOMAIN:-localhost} --o:home_mode.enable=false
      username: ${COLLABORA_ADMIN_USER:-admin}
      password: ${COLLABORA_ADMIN_PASSWORD:-admin}
    volumes:
      - /usr/share/fonts/truetype:/usr/share/fonts/truetype/more:ro
      - /usr/share/fonts/truetype:/opt/cool/systemplate/usr/share/fonts/truetype/more:ro
    entrypoint: ["/bin/bash", "-c"]
    command: ["coolconfig generate-proof-key && /start-collabora-online.sh"]
    ports:
      - "127.0.0.1:9980:9980"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9980/hosting/discovery"]
      interval: 15s
      timeout: 10s
      retries: 5
    logging: *default-logging

  # keycloak: identity provider. profile: sso
  # gates the gateable services through oauth2-proxy. opencloud and jellyfin
  # have native sso plugins - configured separately, see docs/sso.md.
  keycloak-postgres:
    image: postgres:17-alpine
    container_name: qanat-keycloak-postgres
    restart: unless-stopped
    profiles: [sso]
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KC_DB_USERNAME:-keycloak}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - ./keycloak/postgres:/var/lib/postgresql/data
    logging: *default-logging

  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    container_name: qanat-keycloak
    restart: unless-stopped
    profiles: [sso]
    depends_on: [keycloak-postgres]
    command: ["start", "--optimized"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_HOSTNAME: auth.${DOMAIN:-localhost}
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_FEATURES: impersonation
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-kcadmin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "127.0.0.1:8088:8080"
    logging: *default-logging

  # oauth2-proxy: forward-auth gate. caddy asks "is this user logged in?"
  # before letting requests reach aria/metube/navidrome.
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    container_name: qanat-oauth2-proxy
    restart: unless-stopped
    profiles: [sso]
    depends_on: [keycloak]
    command:
      - --http-address=0.0.0.0:4180
      - --reverse-proxy=true
      - --provider=keycloak-oidc
      - --oidc-issuer-url=https://auth.${DOMAIN:-localhost}/realms/qanat
      - --redirect-url=https://auth-gate.${DOMAIN:-localhost}/oauth2/callback
      - --client-id=${OAUTH2_PROXY_CLIENT_ID:-qanat-gate}
      - --client-secret=${OAUTH2_PROXY_CLIENT_SECRET}
      - --cookie-secret=${OAUTH2_PROXY_COOKIE_SECRET}
      - --cookie-domain=.${DOMAIN:-localhost}
      - --cookie-secure=true
      - --cookie-samesite=lax
      - --whitelist-domain=.${DOMAIN:-localhost}
      - --email-domain=*
      - --upstream=static://200
      - --skip-provider-button=true
      - --pass-access-token=true
      - --set-xauthrequest=true
    ports:
      - "127.0.0.1:4180:4180"
    logging: *default-logging

  # authelia: lightweight forward-auth gate. profile: authelia
  # ~50mb ram, file-based config, sqlite session store.
  # alternative to keycloak when you don't need real oidc for external apps.
  authelia:
    image: authelia/authelia:latest
    container_name: qanat-authelia
    restart: unless-stopped
    profiles: [authelia]
    environment:
      - AUTHELIA_JWT_SECRET_FILE=/secrets/JWT_SECRET
      - AUTHELIA_SESSION_SECRET_FILE=/secrets/SESSION_SECRET
      - AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE=/secrets/STORAGE_ENCRYPTION_KEY
      - X_AUTHELIA_CONFIG_FILTERS=template
      - QANAT_DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./config/authelia/configuration.yml:/config/configuration.yml:ro
      - ./config/authelia/users_database.yml:/config/users_database.yml
      - ./authelia/data:/data
      - ./authelia/secrets:/secrets:ro
    ports:
      - "127.0.0.1:9091:9091"
    logging: *default-logging

  # drawio: self-hosted diagrams.net for editing docs/architecture.drawio.
  # profile: diagram. fully client-side - no persistence needed.
  drawio:
    image: jgraph/drawio:latest
    container_name: qanat-drawio
    restart: unless-stopped
    profiles: [diagram]
    environment:
      - DRAWIO_BASE_URL=https://diagram.${DOMAIN:-localhost}
      - DRAWIO_CSP_HEADER=
    ports:
      - "127.0.0.1:8083:8080"
    logging: *default-logging

  # homepage: single-page dashboard linking out to every service above.
  # config lives in ./homepage/config/*.yaml - edit there, no rebuild.
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: qanat-homepage
    restart: unless-stopped
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=${DOMAIN:-localhost}
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
    volumes:
      - ./homepage/config:/app/config
      - ./homepage/icons:/app/public/icons
    ports:
      - "127.0.0.1:3050:3000"
    logging: *default-logging

networks:
  default:
    name: qanat
